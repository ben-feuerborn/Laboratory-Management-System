<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Inventory Item</title>

    <link rel="stylesheet" th:href="@{/inventory/css/system.css}">
    <link rel="stylesheet" th:href="@{/inventory/css/add-item.css}">
</head>

<body>
    <div class="app">

        <!-- Top Navigation -->
        <header class="topbar">
            <div class="brand">
                <div class="logo">CL</div>
                <div>
                    <div class="title">Clinical Lab Management</div>
                    <div class="subtitle">Edit Inventory Item</div>
                </div>
            </div>

            <div class="nav-actions">
                <button class="icon-btn">⚙️</button>
                <button class="btn" onclick="history.back()">Back</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content">
            <div class="container">
                <div class="card form-card">
                    <h1>Edit Inventory Item</h1>

                    <!-- Form with existing data -->
                    <form th:action="@{'/inventory/update/' + ${item.id}}" th:object="${item}" method="post">
                        <div class="form-group">
                            <label for="testType">Test Type</label>
                            <select th:field="*{testType}">
                                <option th:each="type : ${testTypes}" th:value="${type}" th:text="${type}"
                                    th:selected="${type} == ${item.testType}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="name">Item Name</label>
                            <input type="text" id="name" th:field="*{name}" required>
                        </div>

                        <div class="form-group">
                            <label for="quantity">Quantity</label>
                            <input type="number" id="quantity" th:field="*{quantity}" min="0" required>
                        </div>

                        <div class="form-group">
                            <label for="expirationDate">Expiration Date</label>
                            <input type="date" id="expirationDate" th:field="*{expirationDate}" required>
                        </div>

                        <button type="submit" class="btn add-btn">Save Changes</button>
                    </form>
                </div>
            </div>
        </main>

    </div>
</body>

</html>
