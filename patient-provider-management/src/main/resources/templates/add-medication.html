<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Add Medication</title><link rel="stylesheet" th:href="@{/patient-provider/css/system.css}"><link rel="stylesheet" th:href="@{/patient-provider/css/add-patient.css}"></head><body><div class="app"><header class="topbar"><div class="brand"><div class="logo">CL</div><div><div class="title">Clinical Lab Management</div><div class="subtitle">Add Medication</div></div></div><div class="nav-actions"><button class="btn" onclick="history.back()" type="button">Back</button></div></header><main class="content"><div class="container"><div class="card form-card"><h1>Add Medication</h1><form th:action="@{/patient-provider/add/medication}" th:object="${medication}" method="post"><div class="form-group"><label for="name">Name</label><input id="name" th:field="*{name}" required></div><div class="form-group"><label for="dosage">Dosage</label><input id="dosage" th:field="*{dosage}"></div><div class="form-group"><label for="frequency">Frequency</label><input id="frequency" th:field="*{frequency}"></div><div class="form-group"><label for="notes">Notes</label><textarea id="notes" th:field="*{notes}" rows="3"></textarea></div><button type="submit" class="btn add-btn">Add Medication</button></form></div></div></main></div></body></html>
