<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Add Test Record</title><link rel="stylesheet" th:href="@{/patient-provider/css/system.css}"><link rel="stylesheet" th:href="@{/patient-provider/css/add-patient.css}"></head><body><div class="app"><header class="topbar"><div class="brand"><div class="logo">CL</div><div><div class="title">Clinical Lab Management</div><div class="subtitle">Add Test Record</div></div></div><div class="nav-actions"><button class="btn" onclick="history.back()" type="button">Back</button></div></header><main class="content"><div class="container"><div class="card form-card"><h1>Add Test Record</h1><form th:action="@{/patient-provider/add/test}" th:object="${test}" method="post"><div class="form-group"><label for="testName">Test Name</label><input id="testName" th:field="*{testName}" required></div><div class="form-group"><label for="category">Category</label><input id="category" th:field="*{category}"></div><div class="form-group"><label for="status">Status</label><input id="status" th:field="*{status}" placeholder="e.g. In Progress"></div><div class="form-group"><label for="orderedDate">Ordered Date</label><input type="date" id="orderedDate" th:field="*{orderedDate}"></div><div class="form-group"><label for="resultDate">Result Date</label><input type="date" id="resultDate" th:field="*{resultDate}"></div><button type="submit" class="btn add-btn">Add Test Record</button></form></div></div></main></div></body></html>
