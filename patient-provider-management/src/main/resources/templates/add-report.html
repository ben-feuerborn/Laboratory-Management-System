<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Add Report</title><link rel="stylesheet" th:href="@{/patient-provider/css/system.css}"><link rel="stylesheet" th:href="@{/patient-provider/css/add-patient.css}"></head><body><div class="app"><header class="topbar"><div class="brand"><div class="logo">CL</div><div><div class="title">Clinical Lab Management</div><div class="subtitle">Add Report</div></div></div><div class="nav-actions"><button class="btn" onclick="history.back()" type="button">Back</button></div></header><main class="content"><div class="container"><div class="card form-card"><h1>Add Report</h1><form th:action="@{/patient-provider/add/report}" th:object="${report}" method="post"><div class="form-group"><label for="title">Title</label><input id="title" th:field="*{title}" required></div><div class="form-group"><label for="type">Type</label><input id="type" th:field="*{type}" placeholder="Operational / QC / ..."></div><div class="form-group"><label for="author">Author</label><input id="author" th:field="*{author}"></div><button type="submit" class="btn add-btn">Add Report</button></form></div></div></main></div></body></html>
