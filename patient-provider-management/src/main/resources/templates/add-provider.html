<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Add Provider</title><link rel="stylesheet" th:href="@{/patient-provider/css/system.css}"><link rel="stylesheet" th:href="@{/patient-provider/css/add-patient.css}"></head><body><div class="app"><header class="topbar"><div class="brand"><div class="logo">CL</div><div><div class="title">Clinical Lab Management</div><div class="subtitle">Add Provider</div></div></div><div class="nav-actions"><button class="btn" onclick="history.back()" type="button">Back</button></div></header><main class="content"><div class="container"><div class="card form-card"><h1>Add Provider</h1><form th:action="@{/patient-provider/add/provider}" th:object="${provider}" method="post"><div class="form-group"><label for="name">Name</label><input id="name" th:field="*{name}" required></div><div class="form-group"><label for="specialty">Specialty</label><input id="specialty" th:field="*{specialty}"></div><div class="form-group"><label for="phone">Phone</label><input id="phone" th:field="*{phone}"></div><div class="form-group"><label for="email">Email</label><input id="email" th:field="*{email}" type="email"></div><button type="submit" class="btn add-btn">Add Provider</button></form></div></div></main></div></body></html>
