<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clinical Lab - Test Purchase</title>
    <style>
        :root {
            --bg: #f4f6f9;
            --card: #ffffff;
            --muted: #6b7280;
            --accent: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --glass: rgba(255, 255, 255, 0.8);
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: #111827;
        }

        /* Topbar */
        header.topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, var(--card), #f8fafc);
            padding: 12px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(15, 23, 42, 0.05);
        }

        .brand {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .logo {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 16px;
        }

        h1 {
            margin-bottom: 12px;
        }

        .purchase-card {
            background: var(--card);
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .section {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"],
        select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(16, 24, 40, 0.1);
            box-sizing: border-box;
            width: 100%;
        }

        .total {
            font-weight: 700;
            margin-top: 8px;
        }

        ul.test-list {
            list-style: none;
            padding-left: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        button.complete-btn {
            padding: 10px 16px;
            border-radius: 8px;
            border: 0;
            background: var(--accent);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <!-- Dashboard Topbar -->
    <header class="topbar">
        <div class="brand">
            <div class="logo">CL</div>
            <div>
                <div style="font-weight:700">Clinical Lab Management</div>
                <div style="font-size:12px;color:var(--muted)">Test Purchase</div>
            </div>
        </div>

        <div class="nav-actions">
            <button class="icon-btn" title="Settings">⚙️</button>
            <div style="display:flex;align-items:center;gap:10px">
                <div style="text-align:right">
                    <div style="font-weight:700">Username</div>
                    <div style="font-size:12px;color:var(--muted)">Cashier/Physician</div>
                </div>
                <div style="width:40px;height:40px;border-radius:8px;background:#e6eefc;display:flex;align-items:center;justify-content:center">UN</div>
            </div>
                        <!-- Back Button -->
                <div>
                    <button class="btn" onclick="goHome()">Home</button>
                </div>
                <div>
                    <button class="complete-btn" onclick="history.back()">Back</button>
                </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <h1>Test Purchase</h1>
        <p>Select the test(s) to purchase and complete payment below.</p>

        <!-- Server-rendered purchase (flash attribute) -->
        <div class="purchase-card" th:if="${purchase != null}" th:object="${purchase}">
            <h2 th:text="'Purchase Summary'"></h2>

            <div class="section">
                <label>Tests to Purchase:</label>
                <ul class="test-list">
                    <li th:each="t : ${purchase.tests}" th:text="${t.name} + ' - $' + ${t.price}"></li>
                </ul>
                <div class="total">Total: $<span class="total-amount" th:text="${purchase.total}">0</span></div>
            </div>

            <div class="section">
                <label>Payment Method:</label>
                <select class="payment-method">
                    <option value="">Select Payment Method</option>
                    <option value="cash">Cash</option>
                    <option value="debit">Debit Card</option>
                    <option value="credit">Credit Card</option>
                    <option value="insurance">Insurance</option>
                </select>
            </div>

            <div class="section card-fields hidden">
                <label>Card Number:</label>
                <input type="text" placeholder="Enter card number">

                <label>CVV:</label>
                <input type="number" placeholder="Enter CVV">

                <label>Expiry Date:</label>
                <input type="text" placeholder="MM/YY">
            </div>

            <div class="section insurance-fields hidden">
                <label>Insurance Provider / Policy #:</label>
                <input type="text" placeholder="Enter insurance details">
            </div>

            <div class="section">
                <label>POS Signature:</label>
                <input type="text" placeholder="Sign here">
            </div>

            <button class="complete-btn">Complete Purchase</button>
        </div>

        <!-- Fallback client-side data (keeps existing behavior when no flash attribute) -->
        <div class="purchase-card" th:if="${purchase == null}" data-tests='[{"name":"CBC","price":50},{"name":"Urinalysis","price":30}]'>

            <div class="section">
                <label>Tests to Purchase:</label>
                <ul class="test-list"></ul>
                <div class="total">Total: $<span class="total-amount">0</span></div>
            </div>

            <div class="section">
                <label>Payment Method:</label>
                <select class="payment-method">
                    <option value="">Select Payment Method</option>
                    <option value="cash">Cash</option>
                    <option value="debit">Debit Card</option>
                    <option value="credit">Credit Card</option>
                    <option value="insurance">Insurance</option>
                </select>
            </div>

            <div class="section card-fields hidden">
                <label>Card Number:</label>
                <input type="text" placeholder="Enter card number">

                <label>CVV:</label>
                <input type="number" placeholder="Enter CVV">

                <label>Expiry Date:</label>
                <input type="text" placeholder="MM/YY">
            </div>

            <div class="section insurance-fields hidden">
                <label>Insurance Provider / Policy #:</label>
                <input type="text" placeholder="Enter insurance details">
            </div>

            <div class="section">
                <label>POS Signature:</label>
                <input type="text" placeholder="Sign here">
            </div>

            <button class="complete-btn">Complete Purchase</button>
        </div>
    </div>

    <style>
        /* simple modal styles for order checkout */
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; }
        .modal { background: white; padding: 20px; border-radius: 8px; max-width: 480px; width: 90%; box-shadow: 0 6px 24px rgba(2,6,23,0.2); }
        .modal h3 { margin-top:0; }
        .toast { position: fixed; right: 20px; top: 20px; background: #10b981; color: white; padding: 10px 14px; border-radius: 6px; display: none; }
    </style>

    <div class="modal-backdrop" id="orderModal">
        <div class="modal" role="dialog" aria-modal="true">
            <h3>Order Complete</h3>
            <p id="orderSummary">Your order was completed successfully.</p>
            <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:12px;">
                <button id="orderClose" class="complete-btn">Close</button>
                <button id="orderHome" class="complete-btn" style="background:#2563eb">Home</button>
            </div>
        </div>
    </div>

    <div class="toast" id="orderToast">Order completed</div>

    <script>
        document.querySelectorAll('.purchase-card').forEach(card => {
            // client-side dataset population for fallback only
            if (card.dataset && card.dataset.tests) {
                const tests = JSON.parse(card.dataset.tests);
                const testListEl = card.querySelector('.test-list');
                const totalEl = card.querySelector('.total-amount');
                let total = 0;

                tests.forEach(t => {
                    const li = document.createElement('li');
                    li.textContent = `${t.name} - $${t.price}`;
                    testListEl.appendChild(li);
                    total += t.price;
                });
                totalEl.textContent = total;
            }

            const paymentSelect = card.querySelector('.payment-method');
            const cardFields = card.querySelector('.card-fields');
            const insuranceFields = card.querySelector('.insurance-fields');

            if (paymentSelect) {
                paymentSelect.addEventListener('change', () => {
                    if (paymentSelect.value === 'credit' || paymentSelect.value === 'debit') {
                        cardFields.classList.remove('hidden');
                        insuranceFields.classList.add('hidden');
                    } else if (paymentSelect.value === 'insurance') {
                        insuranceFields.classList.remove('hidden');
                        cardFields.classList.add('hidden');
                    } else {
                        cardFields.classList.add('hidden');
                        insuranceFields.classList.add('hidden');
                    }
                });
            }
        });

        // Complete Purchase flow for order checkout: POST to server then show modal/toast
        (function(){
            const completeBtn = document.querySelector('.complete-btn');
            const modal = document.getElementById('orderModal');
            const toast = document.getElementById('orderToast');
            const modalClose = document.getElementById('orderClose');
            const modalHome = document.getElementById('orderHome');

            if (!completeBtn) return;

            completeBtn.addEventListener('click', () => {
                completeBtn.disabled = true;
                fetch('/purchase/confirm', { method: 'POST', headers: { 'X-Requested-With': 'XMLHttpRequest' } })
                    .then(resp => {
                        if (!resp.ok) throw new Error('Server error');
                        const total = document.querySelector('.total-amount')?.textContent || '';
                        const summary = document.getElementById('orderSummary');
                        if (summary) summary.textContent = 'Total: $' + total;
                        modal.style.display = 'flex';
                        toast.style.display = 'block';
                        setTimeout(() => { toast.style.display = 'none'; }, 3500);
                    })
                    .catch(err => { console.error(err); alert('Unable to complete order.'); })
                    .finally(() => { completeBtn.disabled = false; });
            });

            if (modalClose) modalClose.addEventListener('click', () => { modal.style.display='none'; });
            if (modalHome) modalHome.addEventListener('click', () => { window.location.href = '/'; });
        })();
    </script>
        <script>
            (function(){
                function setCookie(n,v,d){var e='';if(d){var t=new Date();t.setTime(t.getTime()+d*24*60*60*1000);e=';expires='+t.toUTCString()}document.cookie=n+'='+encodeURIComponent(v||'')+e+';path=/';}
                function getCookie(n){var m=document.cookie.match('(^|;)\\s*'+n+'=([^;]+)');return m?decodeURIComponent(m[2]):null}
                var p=window.location.pathname;
                if(p.indexOf('/UserDashboards/')!==-1 || /Dashboard/.test(p)) setCookie('lastDashboard',p,7);
                window.goHome=function(){var l=getCookie('lastDashboard');window.location.href=l||'/';}
            })();
        </script>
</body>

</html>
