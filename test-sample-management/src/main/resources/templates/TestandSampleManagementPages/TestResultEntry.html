<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clinical Lab - Test Result Entry</title>
  <link rel="stylesheet" th:href="@{/css/system.css}" href="/css/system.css">
</head>

<body>

<header class="topbar">
  <div class="brand">
    <div class="logo">CL</div>
    <div>
      <div style="font-weight:700">Clinical Lab Management</div>
      <div class="muted-small">Purchase Test Information</div>
    </div>
  </div>

  <div class="nav-actions">
    <button class="icon-btn" title="Settings">⚙️</button>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="text-align:right">
        <div style="font-weight:700">Username</div>
        <div class="muted-small">Manager/Lab Technician</div>
      </div>
      <div style="width:40px;height:40px;border-radius:8px;background:#e6eefc;display:flex;align-items:center;justify-content:center">UN</div>
    </div>

    <div><button class="btn" onclick="goHome()">Home</button></div>
    <div><button class="btn" onclick="history.back()">Back</button></div>
  </div>
</header>


<div class="app">
  <div class="main column-left">
    <div class="card">

      <h1>Test Result Entry</h1>
      <p class="muted-small">
        Enter patient/specimen details and test results.
        Fields marked with * are required.
      </p>

      <!-- CSV Upload -->
      <div class="section">
        <label>Import from CSV:</label>
        <input type="file" id="csvFile" accept=".csv" style="display:none;">
        <button type="button" class="btn" onclick="document.getElementById('csvFile').click()">Choose File</button>
        <span id="fileName" class="muted-small" style="margin-left: 10px;">No file chosen</span>
        <button type="button" class="btn" onclick="importCSV()">Import</button>
      </div>

      <!-- 🟦 FORM START -->
      <form th:action="@{/test-results/add}" th:object="${testResult}" method="post" autocomplete="off">

        <div th:if="${successMessage}" style="margin-bottom:12px;">
          <div style="padding:10px;background:#e6f6ea;border:1px solid #c7efcf;border-radius:8px;color:#0f9d72;">
            <span th:text="${successMessage}"></span>
          </div>
        </div>

        <!-- Report Information -->
        <div class="section">
          <label>Report ID *</label>
          <input th:field="*{testID}" id="testID">
        </div>

        <div class="section">
          <label>Report Date *</label>
          <input type="date" id="reportDate">
        </div>

        <div class="section">
          <label>Report Time *</label>
          <input type="time" id="reportTime">
        </div>

        <!-- Hidden combined LocalDateTime -->
        <input type="hidden" th:field="*{reportDateTime}" id="reportDateTime">

        <!-- Patient Information -->
        <div class="section">
          <label>Patient ID *</label>
          <input th:field="*{patientID}">
        </div>

        <div class="section">
          <label>Patient Name *</label>
          <input th:field="*{patientName}">
        </div>

        <div class="section">
          <label>Date of Birth *</label>
          <input type="date" th:field="*{dob}">
        </div>

        <div class="section">
          <label>Sex *</label>
          <select th:field="*{gender}">
            <option value="">--</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- Physician -->
        <div class="section">
          <label>Physician ID *</label>
          <input th:field="*{physicianID}">
        </div>

        <div class="section">
          <label>Physician Name *</label>
          <input th:field="*{physicianName}">
        </div>

        <!-- Specimen -->
        <div class="section">
          <label>Sample Type *</label>
          <select th:field="*{sampleType}">
            <option value="">--</option>
            <option value="Blood">Blood</option>
            <option value="Urine">Urine</option>
            <option value="Tissue">Tissue</option>
          </select>
        </div>

        <div class="section">
          <label>Sample ID *</label>
          <input th:field="*{sampleID}">
        </div>

        <div class="section">
          <label>Collection Date *</label>
          <input type="date" id="collectionDate">
        </div>

        <div class="section">
          <label>Collection Time *</label>
          <input type="time" id="collectionTime">
        </div>

        <!-- Hidden combined LocalDateTime -->
        <input type="hidden" th:field="*{collectionDateTime}" id="collectionDateTime">

        <div class="section">
          <label>Collected By</label>
          <input th:field="*{collectedBy}">
        </div>

        <div class="section">
          <label>Test Performed By</label>
          <input th:field="*{testPerformedBy}">
        </div>

        <div class="section">
          <label>Machine *</label>
          <input th:field="*{machine}">
        </div>

        <!-- Test Result -->
        <div class="section">
          <label>Test Name *</label>
          <input th:field="*{testName}">
        </div>

        <div class="section">
          <label>Result Values *</label>
          <input th:field="*{resultValues}">
        </div>

        <div class="section">
          <label>Units *</label>
          <input th:field="*{units}">
        </div>

        <div class="section">
          <label>Reference Range</label>
          <input th:field="*{referenceRange}">
        </div>

        <div class="section">
          <label>Result Status *</label>
          <select th:field="*{resultStatus}">
            <option value="">--</option>
            <option value="Pending">Pending</option>
            <option value="Completed">Completed</option>
            <option value="Validated">Validated</option>
          </select>
        </div>

        <div class="section">
          <label>Results Received Date *</label>
          <input type="date" id="resultsReceivedDate">
        </div>

        <div class="section">
          <label>Results Received Time *</label>
          <input type="time" id="resultsReceivedTime">
        </div>

        <!-- Hidden combined LocalDateTime -->
        <input type="hidden" th:field="*{resultsReceivedDateTime}" id="resultsReceivedDateTime">

        <!-- Insurance -->
        <div class="section">
          <label>Insurance Provider *</label>
          <input th:field="*{insuranceProvider}">
        </div>

        <div class="section">
          <label>Insurance Policy *</label>
          <input th:field="*{insurancePolicy}">
        </div>

        <!-- Buttons -->
        <div class="section">
          <button type="submit" class="btn">Submit Results</button>
          <button type="reset" class="btn">Clear Form</button>
        </div>

      </form>
      <!-- 🟦 FORM END -->

    </div>
  </div>
</div>

<script>
  // ---- CSV file name update ----
  const fileInput = document.getElementById('csvFile');
  const fileNameLabel = document.getElementById('fileName');

  fileInput.addEventListener('change', function () {
    const file = this.files[0];
    fileNameLabel.textContent = file ? file.name : 'No file chosen';
  });

  // ---- Combine date + time into LocalDateTime before submit ----
  document.querySelector("form").addEventListener("submit", () => {
    document.getElementById('reportDateTime').value =
      document.getElementById('reportDate').value + "T" +
      document.getElementById('reportTime').value;

    document.getElementById('collectionDateTime').value =
      document.getElementById('collectionDate').value + "T" +
      document.getElementById('collectionTime').value;

    document.getElementById('resultsReceivedDateTime').value =
      document.getElementById('resultsReceivedDate').value + "T" +
      document.getElementById('resultsReceivedTime').value;
  });

  // CSV IMPORT FUNCTION (unchanged)
  function importCSV() {
    const file = fileInput.files[0];
    if (!file) { alert('Please select a CSV file first.'); return; }
    const reader = new FileReader();

    reader.onload = function (e) {
      const text = e.target.result;
      const [headerLine, ...rows] = text.trim().split('\n');
      const headers = headerLine.split(',').map(h => h.trim());
      const firstRow = rows[0].split(',').map(v => v.trim());

      const map = {
        "Report Id": "testID", "Report Date": "reportDate", "Report Time": "reportTime",
        "Patient Id": "patientID", "Patient Name": "patientName", "Date of Birth": "dob",
        "Sex": "gender", "Physician Id": "physicianID", "Physician Name": "physicianName",
        "Sample Type": "sampleType", "Sample Id": "sampleID", "Collection Date": "collectionDate",
        "Collection Time": "collectionTime", "Collection Technician Id": "collectedBy",
        "Testing Technician Id": "testPerformedBy", "Machine Used": "machine",
        "Test Name": "testName", "Result Values": "resultValues",
        "Units": "units", "Result Status": "resultStatus",
        "Results Received Date": "resultsReceivedDate",
        "Results Received Time": "resultsReceivedTime",
        "Insurance Provider": "insuranceProvider",
        "Insurance Policy Number": "insurancePolicy"
      };

      headers.forEach((header, i) => {
        const fieldId = map[header];
        if (fieldId && document.getElementById(fieldId)) {
          document.getElementById(fieldId).value = firstRow[i] || '';
        }
      });

      fileNameLabel.textContent = file.name + " (imported)";
      alert("Form autofilled from CSV!");
    };

    reader.readAsText(file);
  }
</script>

<script>
  (function(){
    function setCookie(n,v,d){var e='';if(d){var t=new Date();t.setTime(t.getTime()+d*24*60*60*1000);e=';expires='+t.toUTCString()}document.cookie=n+'='+encodeURIComponent(v||'')+e+';path=/';}
    function getCookie(n){var m=document.cookie.match('(^|;)\\s*'+n+'=([^;]+)');return m?decodeURIComponent(m[2]):null}
    var p=window.location.pathname; if(p.indexOf('/UserDashboards/')!==-1 || /Dashboard/.test(p)) setCookie('lastDashboard',p,7);
    window.goHome=function(){var l=getCookie('lastDashboard');window.location.href=l||'/';}
  })();
</script>

</body>
</html>
