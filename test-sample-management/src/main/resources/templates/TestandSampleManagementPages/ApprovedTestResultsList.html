<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clinical Lab - Approved Test Results</title>
    <link rel="stylesheet" th:href="@{/css/system.css}" href="/css/system.css">
</head>
<body>
    <div class="app">

        <!-- Top Navigation Bar -->
        <header class="topbar">
            <div class="brand">
                <div class="logo">CL</div>
                <div>
                    <div style="font-weight:700">Clinical Lab Management</div>
                    <div class="muted-small">Approved Test Results</div>
                </div>
            </div>

                <div class="nav-actions">
            <button class="icon-btn" title="Settings">⚙️</button>
                <div style="display:flex;align-items:center;gap:10px">
                    <div style="text-align:right">
                        <div style="font-weight:700">Username</div>
                        <div class="muted-small">Manager/Lab Tech/Patient</div>
                    </div>
                    <div style="width:40px;height:40px;border-radius:8px;background:#e6eefc;display:flex;align-items:center;justify-content:center">UN</div>
                </div>

                <div>
                    <button class="btn" onclick="goHome()">Home</button>
                </div>
                <div>
                    <button class="btn" onclick="history.back()">Back</button>
                </div>
            </div>
            
        </header>

        <!-- Main Content Area -->
        <main style="padding:16px; display:flex; justify-content:center;">
            <div class="column-left" style="width:100%; max-width:1200px;">


                <div class="card">
                    <h1>Approved Test Results</h1>
                    <p class="lead">These are the validated test results that have been approved for release.</p>

                    <table>
                        <thead>
                            <tr>
                                <th>Report ID</th>
                                <th>Patient</th>
                                <th>Test Name</th>
                                <th>Result</th>
                                <th>Units</th>
                                <th>Result Status</th>
                                <th>Results Received</th>
                            </tr>
                        </thead>
                        <tbody id="resultsTableBody">
                            <!-- Rows will be loaded from CSV -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Load approved/validated results from the REST API and render into the table
        async function loadApprovedResults() {
            try {
                const res = await fetch('/api/test-results');
                const data = await res.json();

                const tableBody = document.getElementById('resultsTableBody');
                tableBody.innerHTML = '';

                // Filter for validated/approved results
                const approved = data.filter(t => {
                    const s = (t.resultStatus || '').toString().toLowerCase();
                    return s.includes('valid') || s.includes('approve');
                });

                approved.forEach(test => {
                    const tr = document.createElement('tr');

                    const reportId = test.reportID || test.testID || '';
                    const patient = test.patientName || test.patientID || '';
                    const testName = test.testName || '';
                    const result = test.resultValues || '';
                    const units = test.units || '';
                    const status = test.resultStatus || '';
                    const received = test.resultsReceivedDateTime ? new Date(test.resultsReceivedDateTime).toLocaleString() : '';

                    const cells = [reportId, patient, testName, result, units, status, received];

                    cells.forEach(txt => {
                        const td = document.createElement('td');
                        td.textContent = txt;
                        tr.appendChild(td);
                    });

                    tableBody.appendChild(tr);
                });
            } catch (err) {
                console.error('Error loading approved results:', err);
            }
        }

        loadApprovedResults();
    </script>
</body>
<script>
    (function(){
        function setCookie(n,v,d){var e='';if(d){var t=new Date();t.setTime(t.getTime()+d*24*60*60*1000);e=';expires='+t.toUTCString()}document.cookie=n+'='+encodeURIComponent(v||'')+e+';path=/';}
        function getCookie(n){var m=document.cookie.match('(^|;)\\s*'+n+'=([^;]+)');return m?decodeURIComponent(m[2]):null}
        var p=window.location.pathname;
        if(p.indexOf('/UserDashboards/')!==-1 || /Dashboard/.test(p)) setCookie('lastDashboard',p,7);
        window.goHome=function(){var l=getCookie('lastDashboard');window.location.href=l||'/';}
    })();
</script>
</html>
